            },
            {
              "php": "8.3",
              "wp": "latest",
              "mysql": "mysql-8.0"
            },
            {
              "php": "8.3",
              "wp": "latest",
              "mysql": "mysql-8.4"
            },
            {
              "php": "8.3",
              "wp": "latest",
              "dbtype": "sqlite"
            },
            {
              "php": "8.3",
              "wp": "latest",
              "mysql": "mariadb-11.4",
              "dbtype": "mariadb"
            },
            {
              "php": "8.4",
              "wp": "latest",
              "mysql": "mysql-8.0"
            },
            {
