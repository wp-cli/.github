name: Testing

on:
  workflow_call:
    inputs:
      minimum-php:
        description: 'Minimum PHP version to test against.'
        type: string
        required: false
        default: '7.2'
      minimum-wp:
        description: 'Minimum WP version to test against.'
        type: string
        required: false
        default: '4.9'
      with-coverage:
        description: 'Include coverages tests.'
        type: boolean
        required: false
        default: true
      matrix:
        description: 'Additional matrix entries to include or exclude.'
        type: string
        required: false
        default: '{ "include": [], "exclude": [] }'

permissions:
  contents: read

# Cancels all previous workflow runs for the same branch that have not yet completed.
concurrency:
  # The concurrency group contains the workflow name and the branch name.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  get-matrix:
    name: Get base test matrix
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.base-matrix.outputs.matrix }}
    steps:
    - name: Set matrix
      id: base-matrix
      env:
        ADDITIONAL_MATRIX: ${{ inputs.matrix }}
      run: |
        MATRIX=$(cat << EOF
        {
          "include": [
            {
              "php": "7.2",
              "wp": "4.9",
              "mysql": "mysql-5.6"
            },
            {
              "php": "7.2",
              "wp": "latest",
              "mysql": "mysql-8.0"
            },
            {
              "php": "7.2",
              "wp": "latest",
              "dbtype": "sqlite"
            },
            {
              "php": "7.3",
              "wp": "latest",
              "mysql": "mysql-8.0"
            },
            {
              "php": "7.3",
              "wp": "latest",
              "dbtype": "sqlite"
            },
            {
              "php": "7.4",
              "wp": "latest",
              "mysql": "mysql-8.0"
            },
            {
              "php": "7.4",
              "wp": "latest",
              "dbtype": "sqlite"
            },
            {
              "php": "8.0",
              "wp": "latest",
              "mysql": "mysql-8.0"
            },
            {
              "php": "8.0",
              "wp": "latest",
              "dbtype": "sqlite"
            },
            {
